<!DOCTYPE html>
<html>
<body>

<h2>Registered Courses</h2>

<table border="1">
<tr>
    <th>Course</th>
    <th>Student</th>
    <th>Email</th>
</tr>

{% for c in courses %}
<tr>
    <td>{{ c.name }}</td>
    <td>{{ c.student }}</td>
    <td>{{ c.email }}</td>
</tr>
{% endfor %}

</table>

</body>
</html>
