<body>
    <h2>Student Form</h2>
    {% if msg %}
    <p style="color: green;">{{ msg }}</p>
    {% endif %}
    <form method="post">
        {% csrf_token %}
        Name: <input type="text" name="name"><br><br>
        Roll: <input type="text" name="roll"><br><br>
        Course: <input type="text" name="course"><br><br>
        <button type="submit">Submit</button>

    </form>
    <br>
<a href="/display/">View Students</a>
</body>
</html>
